<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Clock face -->
  <circle cx="24" cy="24" r="21" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Hour markers at 12, 3, 6, 9 -->
  <line x1="24" y1="5"  x2="24" y2="10" stroke="#94a3b8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="24" y1="38" x2="24" y2="43" stroke="#94a3b8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="5"  y1="24" x2="10" y2="24" stroke="#94a3b8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="38" y1="24" x2="43" y2="24" stroke="#94a3b8" stroke-width="2"   stroke-linecap="round"/>
  <!-- Hour hand (pointing toward 10) -->
  <line x1="24" y1="24" x2="15" y2="13" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing toward 2) -->
  <line x1="24" y1="24" x2="34" y2="16" stroke="#3b82f6" stroke-width="2"   stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="#f1f5f9"/>
</svg>
